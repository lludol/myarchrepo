name: Commit and push
description: >-
  Stage paths, commit on the current branch, and push to origin.
  Use actions/checkout with token (e.g. secrets.GH_API_TOKEN || github.token) so push is authenticated.

inputs:
  add_paths:
    description: Paths to stage for the commit (same as peter-evans add-paths; one path per workflow here).
    required: true
  commit_message:
    description: Commit message for the update commit.
    required: true

runs:
  using: composite
  steps:
    - name: Commit and push
      shell: bash
      env:
        ADD_PATHS: ${{ inputs.add_paths }}
        COMMIT_MSG: ${{ inputs.commit_message }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -- "$ADD_PATHS"
        if git diff --staged --quiet; then
          echo "No staged changes; nothing to commit."
          exit 0
        fi
        git commit -m "$COMMIT_MSG"
        git push origin "HEAD:${GITHUB_REF_NAME}"
