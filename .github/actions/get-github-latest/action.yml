name: Get latest GitHub release version
description: Reads pkgver from PKGBUILD and compares it to latest GitHub release tag.

inputs:
  repo:
    description: GitHub owner/repo (for example, beekeeper-studio/beekeeper-studio).
    required: true
  pkgbuild_path:
    description: Path to PKGBUILD file.
    required: true
  gh_api_token:
    description: Optional GitHub API token for higher rate limits.
    required: false
    default: ""

outputs:
  current:
    description: Current version from PKGBUILD pkgver.
    value: ${{ steps.versions.outputs.current }}
  latest:
    description: Latest version from GitHub releases latest tag_name.
    value: ${{ steps.versions.outputs.latest }}
  update_available:
    description: true when latest is newer than current.
    value: ${{ steps.versions.outputs.update_available }}

runs:
  using: composite
  steps:
    - name: Resolve current and latest versions
      id: versions
      shell: bash
      env:
        REPO: ${{ inputs.repo }}
        PKGBUILD_PATH: ${{ inputs.pkgbuild_path }}
        GH_API_TOKEN: ${{ inputs.gh_api_token }}
      run: |
        current=$(grep '^pkgver=' "$PKGBUILD_PATH" | cut -d= -f2)
        CURL_OPTS=()
        [[ -n "${GH_API_TOKEN:-}" ]] && CURL_OPTS=(-H "Authorization: Bearer $GH_API_TOKEN")
        resp=$(curl -sS "${CURL_OPTS[@]}" "https://api.github.com/repos/$REPO/releases/latest")
        latest=$(echo "$resp" | grep -o '"tag_name": *"[^"]*"' | head -n1 | sed 's/"tag_name": *"v\?\([^"]*\)"/\1/')
        if [[ -z "$latest" ]]; then
          echo "Could not parse latest release for $REPO"
          exit 1
        fi

        older=$(printf '%s\n%s' "$current" "$latest" | sort -V | head -n1)
        update_available=false
        [[ "$older" == "$current" && "$current" != "$latest" ]] && update_available=true

        echo "current=$current" >> "$GITHUB_OUTPUT"
        echo "latest=$latest" >> "$GITHUB_OUTPUT"
        echo "update_available=$update_available" >> "$GITHUB_OUTPUT"
        echo "Current: $current | Latest: $latest | Update: $update_available"
