name: Update PKGBUILD from GitHub tarball
description: Validate release tarball structure, then update pkgver/pkgrel/checksums via archlinux-package-action.

inputs:
  repo:
    description: GitHub owner/repo (for example, abenz1267/elephant).
    required: true
  version:
    description: Release version without v prefix.
    required: true
  pkgbuild_path:
    description: Path to PKGBUILD file.
    required: true
  required_path:
    description: Optional path that must exist inside extracted tarball root.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate required path in tarball
      if: ${{ inputs.required_path != '' }}
      shell: bash
      env:
        REPO: ${{ inputs.repo }}
        VERSION: ${{ inputs.version }}
        REQUIRED_PATH: ${{ inputs.required_path }}
      run: |
        set -euo pipefail

        url="https://github.com/${REPO}/archive/refs/tags/v${VERSION}.tar.gz"
        archive_path="package-${VERSION}.tar.gz"
        curl -sSLo "$archive_path" "$url"

        root_dir=$(tar -tzf "$archive_path" | sed -n '1s#/.*##p')
        if [[ -z "${root_dir:-}" ]]; then
          echo "Could not determine tarball root directory for ${REPO} v${VERSION}"
          exit 1
        fi

        if ! tar -tzf "$archive_path" | grep -E "^${root_dir}/${REQUIRED_PATH}(/|$)" > /dev/null; then
          echo "Required path not found in release tarball: ${REQUIRED_PATH}"
          exit 1
        fi

        rm -f "$archive_path"

    - name: Get PKGBUILD directory
      id: pkgdir
      shell: bash
      run: echo "dir=$(dirname "${{ inputs.pkgbuild_path }}")" >> "$GITHUB_OUTPUT"

    - name: Update PKGBUILD
      uses: heyhusen/archlinux-package-action@v3.0.0
      with:
        path: ${{ steps.pkgdir.outputs.dir }}
        pkgver: ${{ inputs.version }}
        pkgrel: 1
        updpkgsums: true
        srcinfo: false
        namcap: true
        flags: ''
        archlinux_keyring: false
