# Check for new overskride release and commit and push PKGBUILD updates.
# Runs weekly (Monday 06:00 UTC) and can be triggered manually (Actions tab -> Run workflow).

name: Update overskride

on:
  workflow_dispatch:
  schedule:
    - cron: '21 4 * * 1'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - job: default
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_API_TOKEN || github.token }}

      - name: Set skip Create PR flag
        id: skip_create_pr
        run: echo "skip=${{ secrets.SKIP_CREATE_PR }}" >> "$GITHUB_OUTPUT"

      - name: Get current and latest version
        id: versions
        uses: ./.github/actions/get-github-latest
        with:
          repo: kaii-lb/overskride
          pkgbuild_path: src/overskride/PKGBUILD
          gh_api_token: ${{ secrets.GH_API_TOKEN || github.token }}

      - name: Update PKGBUILD from GitHub tarball
        if: steps.versions.outputs.update_available == 'true'
        uses: ./.github/actions/update-github-tarball-pkgbuild
        with:
          repo: kaii-lb/overskride
          version: ${{ steps.versions.outputs.latest }}
          pkgbuild_path: src/overskride/PKGBUILD
          required_path: meson.build

      - name: Commit and push
        if: steps.versions.outputs.update_available == 'true' && steps.skip_create_pr.outputs.skip != 'true'
        uses: ./.github/actions/commit-and-push
        with:
          add_paths: src/overskride/PKGBUILD
          commit_message: "chore(overskride): bump to ${{ steps.versions.outputs.latest }}"
