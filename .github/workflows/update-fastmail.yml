# Check for new Fastmail desktop release and commit and push PKGBUILD updates.
# Runs weekly (Monday 06:00 UTC) and can be triggered manually (Actions tab -> Run workflow).

name: Update fastmail

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * 1'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - job: default
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_API_TOKEN || github.token }}

      - name: Set skip Create PR flag
        id: skip_create_pr
        run: echo "skip=${{ secrets.SKIP_CREATE_PR }}" >> "$GITHUB_OUTPUT"

      - name: Get current and latest version
        id: versions
        uses: ./.github/actions/get-flathub-latest
        with:
          app_id: com.fastmail.Fastmail
          pkgbuild_path: src/fastmail/PKGBUILD

      - name: Download AppImage and compute checksums
        if: steps.versions.outputs.update_available == 'true'
        id: checksums
        run: |
          latest="${{ steps.versions.outputs.latest }}"
          PKGDIR="src/fastmail"
          appimg="com.fastmail.Fastmail-${latest}.AppImage"
          url="https://dl.fastmailcdn.com/desktop/production/linux/x64/${appimg}"

          curl -sSLo "${PKGDIR}/${appimg}" "$url"
          sha_appimg=$(sha512sum -b "${PKGDIR}/${appimg}" | awk '{ print $1 }')
          sha_license=$(sha512sum -b "${PKGDIR}/LICENSE.md" | awk '{ print $1 }')

          echo "sha_appimg=$sha_appimg" >> "$GITHUB_OUTPUT"
          echo "sha_license=$sha_license" >> "$GITHUB_OUTPUT"

      - name: Clean downloaded assets
        if: steps.versions.outputs.update_available == 'true'
        run: rm -f "src/fastmail/com.fastmail.Fastmail-${{ steps.versions.outputs.latest }}.AppImage"

      - name: Update PKGBUILD
        if: steps.versions.outputs.update_available == 'true'
        run: |
          PKGBUILD="src/fastmail/PKGBUILD"
          latest="${{ steps.versions.outputs.latest }}"
          sha_appimg="${{ steps.checksums.outputs.sha_appimg }}"
          sha_license="${{ steps.checksums.outputs.sha_license }}"

          sed -i "s/^pkgver=.*/pkgver=${latest}/" "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"

          cat > /tmp/sha512block << EOF
          sha512sums=('${sha_appimg}'
                      '${sha_license}')
          EOF

          awk '
            /^sha512sums=/ { inblock=1; system("cat /tmp/sha512block"); next }
            inblock && /\)/ { inblock=0; next }
            inblock { next }
            { print }
          ' "$PKGBUILD" > "$PKGBUILD.new"
          mv "$PKGBUILD.new" "$PKGBUILD"

          echo "Updated PKGBUILD:"
          grep -E '^(pkgver|pkgrel)=' "$PKGBUILD"
          grep -A 2 '^sha512sums=' "$PKGBUILD"

      - name: Commit and push
        if: steps.versions.outputs.update_available == 'true' && steps.skip_create_pr.outputs.skip != 'true'
        uses: ./.github/actions/commit-and-push
        with:
          add_paths: src/fastmail/PKGBUILD
          commit_message: "chore(fastmail): bump to ${{ steps.versions.outputs.latest }}"
