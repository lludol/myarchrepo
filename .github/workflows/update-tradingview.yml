# Check for new TradingView release (Snap Store) and commit and push PKGBUILD updates.
# Runs weekly (Monday 06:00 UTC) and can be triggered manually (Actions tab -> Run workflow).
# Version and download URL from Snap Store API (api.snapcraft.io).

name: Update tradingview

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - job: default
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_API_TOKEN || github.token }}

      - name: Set skip Create PR flag
        id: skip_create_pr
        run: echo "skip=${{ secrets.SKIP_CREATE_PR }}" >> "$GITHUB_OUTPUT"

      - name: Get current and latest version
        id: versions
        uses: ./.github/actions/get-snap-latest
        with:
          snap_name: tradingview
          pkgbuild_path: src/tradingview/PKGBUILD

      - name: Download .snap and compute sha256
        if: steps.versions.outputs.update_available == 'true'
        id: checksums
        run: |
          latest="${{ steps.versions.outputs.latest }}"
          download_url="${{ steps.versions.outputs.download_url }}"
          PKGDIR="src/tradingview"
          curl -sSLo "${PKGDIR}/tradingview-${latest}.snap" "$download_url"
          sha_snap=$(sha256sum -b "${PKGDIR}/tradingview-${latest}.snap" | awk '{ print $1 }')
          echo "sha_snap=$sha_snap" >> "$GITHUB_OUTPUT"

      - name: Clean downloaded assets
        if: steps.versions.outputs.update_available == 'true'
        run: rm -f "src/tradingview/tradingview-${{ steps.versions.outputs.latest }}.snap"

      - name: Update PKGBUILD
        if: steps.versions.outputs.update_available == 'true'
        run: |
          PKGBUILD="src/tradingview/PKGBUILD"
          latest="${{ steps.versions.outputs.latest }}"
          download_url="${{ steps.versions.outputs.download_url }}"
          sha_snap="${{ steps.checksums.outputs.sha_snap }}"

          sed -i "s/^pkgver=.*/pkgver=${latest}/" "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"
          # Replace first sha256 (64-char hex) line only; keep 'SKIP' for the second source
          sed -i "/^  '[0-9a-f]\{64\}'\$/s/.*/  '${sha_snap}'/" "$PKGBUILD"
          # Update the snap download URL (line with .snap::)
          sed -i "s|\"https://api.snapcraft.io/api/v1/snaps/download/[^\"]*\"|\"${download_url}\"|" "$PKGBUILD"

          echo "Updated PKGBUILD:"
          grep -E '^(pkgver|pkgrel)=' "$PKGBUILD"
          grep -A 3 '^sha256sums=' "$PKGBUILD"
          grep '\.snap::' "$PKGBUILD"

      - name: Commit and push
        if: steps.versions.outputs.update_available == 'true' && steps.skip_create_pr.outputs.skip != 'true'
        uses: ./.github/actions/commit-and-push
        with:
          add_paths: src/tradingview/PKGBUILD
          commit_message: "chore(tradingview): bump to ${{ steps.versions.outputs.latest }}"
