# Check for new Elephant release and open PRs per elephant package.
# Runs weekly (Monday 06:00 UTC) and can be triggered manually (Actions tab -> Run workflow).

name: Update elephant

on:
  workflow_dispatch:
  schedule:
    - cron: '12 4 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: elephant
            pkgbuild: src/elephant/PKGBUILD
            required_path: cmd/elephant
          - name: elephant-bluetooth
            pkgbuild: src/elephant-bluetooth/PKGBUILD
            required_path: internal/providers/bluetooth
          - name: elephant-calc
            pkgbuild: src/elephant-calc/PKGBUILD
            required_path: internal/providers/calc
          - name: elephant-clipboard
            pkgbuild: src/elephant-clipboard/PKGBUILD
            required_path: internal/providers/clipboard
          - name: elephant-desktopapplications
            pkgbuild: src/elephant-desktopapplications/PKGBUILD
            required_path: internal/providers/desktopapplications
          - name: elephant-files
            pkgbuild: src/elephant-files/PKGBUILD
            required_path: internal/providers/files
          - name: elephant-menus
            pkgbuild: src/elephant-menus/PKGBUILD
            required_path: internal/providers/menus
          - name: elephant-symbols
            pkgbuild: src/elephant-symbols/PKGBUILD
            required_path: internal/providers/symbols
          - name: elephant-unicode
            pkgbuild: src/elephant-unicode/PKGBUILD
            required_path: internal/providers/unicode
          - name: elephant-websearch
            pkgbuild: src/elephant-websearch/PKGBUILD
            required_path: internal/providers/websearch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set skip Create PR flag
        id: skip_create_pr
        run: echo "skip=${{ secrets.SKIP_CREATE_PR }}" >> "$GITHUB_OUTPUT"

      - name: Get current and latest version
        id: versions
        uses: ./.github/actions/get-github-latest
        with:
          repo: abenz1267/elephant
          pkgbuild_path: ${{ matrix.package.pkgbuild }}
          gh_api_token: ${{ secrets.GH_API_TOKEN || github.token }}

      - name: Update package PKGBUILD safely
        if: steps.versions.outputs.update_available == 'true'
        id: update_pkgbuild
        uses: ./.github/actions/update-github-tarball-pkgbuild
        with:
          repo: abenz1267/elephant
          version: ${{ steps.versions.outputs.latest }}
          pkgbuild_path: ${{ matrix.package.pkgbuild }}
          required_path: ${{ matrix.package.required_path }}

      - name: Create Pull Request
        if: steps.versions.outputs.update_available == 'true' && steps.skip_create_pr.outputs.skip != 'true'
        uses: ./.github/actions/create-update-pr
        with:
          token: ${{ secrets.GH_API_TOKEN }}
          branch: update/${{ matrix.package.name }}-${{ steps.versions.outputs.latest }}
          title: "chore(${{ matrix.package.name }}): bump to ${{ steps.versions.outputs.latest }}"
          body: |
            Automated update for **${{ matrix.package.name }}**.
            - **Previous:** ${{ steps.versions.outputs.current }}
            - **New:** ${{ steps.versions.outputs.latest }}
            - `pkgrel` reset to 1; `sha256sums` updated from GitHub tarball.
            - Validated required source path: `${{ matrix.package.required_path }}`
          add_paths: ${{ matrix.package.pkgbuild }}
          commit_message: "chore(${{ matrix.package.name }}): bump to ${{ steps.versions.outputs.latest }}"
