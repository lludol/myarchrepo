# Check for new Slack Desktop beta release and commit and push PKGBUILD updates.
# Runs weekly (Monday 06:00 UTC) and can be triggered manually (Actions tab -> Run workflow).

name: Update slack-desktop-wayland

on:
  workflow_dispatch:
  schedule:
    - cron: '24 4 * * 1'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - job: default
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_API_TOKEN || github.token }}

      - name: Set skip Create PR flag
        id: skip_create_pr
        run: echo "skip=${{ secrets.SKIP_CREATE_PR }}" >> "$GITHUB_OUTPUT"

      - name: Get current and latest version
        id: versions
        run: |
          PKGBUILD="src/slack-desktop-wayland/PKGBUILD"
          current=$(grep '^pkgver=' "$PKGBUILD" | cut -d= -f2)

          # Old redirect endpoint is 404; get latest version from release notes and use known CDN URL pattern
          latest=$(curl -sS "https://slack.com/intl/en-au/release-notes/linux" \
            | grep -oE 'Slack [0-9]+\.[0-9]+\.[0-9]+' \
            | head -1 \
            | sed 's/Slack //')
          if [[ -z "$latest" ]]; then
            echo "Could not parse latest Slack version from release notes"
            exit 1
          fi

          download_url="https://downloads.slack-edge.com/desktop-releases/linux/x64/${latest}/slack-desktop-${latest}-amd64.deb"
          if ! curl -sSI -o /dev/null -w '%{http_code}' "$download_url" | grep -q 200; then
            echo "Could not resolve Slack beta download URL (HTTP check failed): $download_url"
            exit 1
          fi

          older=$(printf '%s\n%s' "$current" "$latest" | sort -V | head -n1)
          update_available=false
          [[ "$older" == "$current" && "$current" != "$latest" ]] && update_available=true

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "download_url=$download_url" >> "$GITHUB_OUTPUT"
          echo "update_available=$update_available" >> "$GITHUB_OUTPUT"
          echo "Current: $current | Latest: $latest | Update: $update_available"

      - name: Download package and compute b2 checksums
        if: steps.versions.outputs.update_available == 'true'
        id: checksums
        run: |
          latest="${{ steps.versions.outputs.latest }}"
          download_url="${{ steps.versions.outputs.download_url }}"
          PKGDIR="src/slack-desktop-wayland"

          curl -sSLo "${PKGDIR}/slack-desktop-${latest}-amd64.deb" "$download_url"
          b2_deb=$(b2sum "${PKGDIR}/slack-desktop-${latest}-amd64.deb" | awk '{ print $1 }')
          b2_patch=$(b2sum "${PKGDIR}/slack-desktop.patch" | awk '{ print $1 }')

          echo "b2_deb=$b2_deb" >> "$GITHUB_OUTPUT"
          echo "b2_patch=$b2_patch" >> "$GITHUB_OUTPUT"

      - name: Clean downloaded assets
        if: steps.versions.outputs.update_available == 'true'
        run: rm -f "src/slack-desktop-wayland/slack-desktop-${{ steps.versions.outputs.latest }}-amd64.deb"

      - name: Update PKGBUILD
        if: steps.versions.outputs.update_available == 'true'
        run: |
          PKGBUILD="src/slack-desktop-wayland/PKGBUILD"
          latest="${{ steps.versions.outputs.latest }}"
          b2_deb="${{ steps.checksums.outputs.b2_deb }}"
          b2_patch="${{ steps.checksums.outputs.b2_patch }}"

          sed -i "s/^pkgver=.*/pkgver=${latest}/" "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"

          cat > /tmp/b2block << EOF
          b2sums=('${b2_deb}'
                  '${b2_patch}')
          EOF

          awk '
            /^b2sums=/ { inblock=1; system("cat /tmp/b2block"); next }
            inblock && /\)/ { inblock=0; next }
            inblock { next }
            { print }
          ' "$PKGBUILD" > "$PKGBUILD.new"
          mv "$PKGBUILD.new" "$PKGBUILD"

          echo "Updated PKGBUILD:"
          grep -E '^(pkgver|pkgrel)=' "$PKGBUILD"
          grep -A 2 '^b2sums=' "$PKGBUILD"

      - name: Commit and push
        if: steps.versions.outputs.update_available == 'true' && steps.skip_create_pr.outputs.skip != 'true'
        uses: ./.github/actions/commit-and-push
        with:
          add_paths: src/slack-desktop-wayland/PKGBUILD
          commit_message: "chore(slack-desktop-wayland): bump to ${{ steps.versions.outputs.latest }}"
